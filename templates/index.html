{% extends 'base.html' %}

{% block content %}
<section class="hero">
    <div class="hero-content">
        <h2 class="floating" style="margin-bottom: 0;">Welcome to my portfolio</h2>
        <h1 class="royal-text">HARISUDHAN K</h1>
        <div class="typing-container" style="font-size: 1.5rem; color: var(--text-dim); margin-bottom: 40px;">
            I am a <span style="color: var(--accent-purple); font-weight: bold;">Web Developer</span>
        </div>
        <div class="hero-buttons" style="display: flex; gap: 20px; justify-content: center;">
            <a href="{{ url_for('main.projects') }}" class="btn-neon" style="text-decoration: none;">View Projects</a>
            <a href="{{ url_for('main.contact') }}" class="btn-neon" style="background: transparent; border: 2px solid var(--accent-blue); color: var(--accent-blue); text-decoration: none;">Contact Me</a>
        </div>
    </div>
</section>
{% endblock %}
